name: Release

# Cut a GitHub Release from a version tag (e.g. push tag `v0.1.0-testnet`).
# A hyphen in the tag (semver pre-release identifier) marks it as a GitHub
# pre-release. Builds are UNSIGNED / un-notarized — intended for testnet/beta
# testers only (see the release notes for the Gatekeeper/SmartScreen steps).
# Signing + notarization is Phase 7c, layered on later.
#
# Cut a release from a CI-green commit on main:  git tag v0.1.0-testnet && git push origin v0.1.0-testnet
on:
  push:
    tags: ['v*']

# Creating the Release + uploading assets needs write; the CI gate stays read-only.
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # Pass the tag through the environment (never interpolate ${{ }} straight
    # into a run: shell — a crafted tag name would be a command-injection vector).
    env:
      VERSION: ${{ github.ref_name }}
      # Baked into the frontend bundle at Vite build time (NOT a secret — WC
      # project ids ship in every bundle by design). Locally this comes from
      # gitignored frontend/.env.local; CI must inject it or WalletConnect is
      # silently dead in shipped binaries (the v0.3.0/v0.3.1 regression).
      VITE_WALLETCONNECT_PROJECT_ID: ${{ vars.VITE_WALLETCONNECT_PROJECT_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Fail LOUDLY if the id is missing — a release without it builds fine but
      # ships a feature-dead WalletConnect screen, discovered only by users.
      - name: Require WalletConnect project id
        shell: bash
        run: |
          if [ -z "$VITE_WALLETCONNECT_PROJECT_ID" ]; then
            echo "::error::VITE_WALLETCONNECT_PROJECT_ID is unset — configure the repo Actions variable before cutting a release."
            exit 1
          fi
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Linux WebKit deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      # wails build runs frontend:install + frontend:build then compiles the Go
      # app into build/bin/. ubuntu-24.04 ships webkit2gtk-4.1 → needs webkit2_41.
      - name: Wails build (Linux)
        if: runner.os == 'Linux'
        run: wails build -tags webkit2_41
      - name: Wails build
        if: runner.os != 'Linux'
        run: wails build

      # --- package each platform's output into one asset, named with the tag ---
      # Asset names use the repo/product prefix "go-syrius"; the built binary
      # itself is still "syrius" (wails.json outputfilename) → inputs stay syrius*.
      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: tar -C build/bin -czf "go-syrius-${VERSION}-linux-amd64.tar.gz" syrius
      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        # ditto preserves the .app bundle (perms, symlinks, signature); a plain
        # zip would corrupt it. (No arch suffix: macos-latest is Apple Silicon.)
        run: ditto -c -k --keepParent build/bin/syrius.app "go-syrius-${VERSION}-macos.zip"
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cp build/bin/syrius.exe "go-syrius-${VERSION}-windows-amd64.exe"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: syrius-${{ runner.os }}
          path: go-syrius-*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Checksums
        shell: bash
        run: |
          cd artifacts
          sha256sum go-syrius-* > SHA256SUMS
          cat SHA256SUMS
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: ${{ github.ref_name }}
          # Semver pre-release tags (with a hyphen) → GitHub pre-release.
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Keep this body release-agnostic (it is stamped on EVERY tag, testnet
          # or mainnet). Release-specific highlights are added to the published
          # release afterwards (gh release edit); generate_release_notes appends
          # the PR changelog automatically.
          body: |
            ## ${{ github.ref_name }} (unsigned build)

            These binaries are **not code-signed or notarized** (signing lands in
            Phase 7c), so your OS will warn:
            - **macOS:** right-click the app → Open → Open (bypasses Gatekeeper), or
              `xattr -dr com.apple.quarantine syrius.app` before first launch.
            - **Windows:** SmartScreen → *More info* → *Run anyway*.

            Verify your download against `SHA256SUMS` before running.
          files: |
            artifacts/go-syrius-*
            artifacts/SHA256SUMS
