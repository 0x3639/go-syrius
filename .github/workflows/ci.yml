name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least privilege: the gate only reads the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save runner time.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      # package main has //go:embed all:frontend/dist; provide a stub so the Go
      # tooling can compile it. The security scanners analyze Go source, not the
      # frontend bundle, so a placeholder is sufficient here.
      - name: Stub frontend/dist for //go:embed
        run: mkdir -p frontend/dist && touch frontend/dist/index.html
      - name: govulncheck (allowlist gate)
        run: |
          # Pinned (GS-10): the vuln gate must not depend on whatever @latest
          # resolves to at run time. go-install version pins are immutable via
          # the Go module checksum DB (which is why gosec@v2.27.1 and
          # wails@v2.12.0 need no change).
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          bash scripts/govulncheck-gate.sh
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.27.1
          gosec -conf .gosec.json ./...

  # Race detector on Linux (needs cgo + runtime/race, which the release
  # toolchain ships there). The wallet has real concurrency — settings writers,
  # node reconnects, publish vs auto-receive — so -race gates regressions the
  # plain test job can't see.
  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Stub frontend/dist for //go:embed
        run: mkdir -p frontend/dist && touch frontend/dist/index.html
      - run: go test -race ./...
      # The integration-tag suite is excluded from ordinary runs, so nothing
      # compiles it by default — keep it building against the current bindings
      # (it rotted silently once; round-4 review finding).
      - name: Integration suite compiles
        run: go test -tags integration ./internal/spike -run '^$'

  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Linux WebKit deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      # Build the frontend bundle so package main's //go:embed all:frontend/dist
      # resolves for go vet / go test (wails build rebuilds it afterwards).
      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
      - run: go vet ./...
      - run: go test ./...
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      # ubuntu-24.04 ships webkit2gtk-4.1 (not 4.0, which Wails defaults to), so
      # the Linux build needs the webkit2_41 tag.
      - name: Wails build (Linux)
        if: runner.os == 'Linux'
        run: wails build -tags webkit2_41
      - name: Wails build
        if: runner.os != 'Linux'
        run: wails build
