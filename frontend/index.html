<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>syrius</title>
    <!-- Paint the dark theme background instantly. The app's stylesheet is
         injected by JS (Vite dev) / loaded async, so without this the page
         flashes white before nom-ui's `body { background: var(--background) }`
         applies. Value mirrors nom-ui's dark `--background: hsl(0 0% 8%)`. -->
    <style>
      html,
      body {
        margin: 0;
        background: hsl(0 0% 8%);
        color-scheme: dark;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
