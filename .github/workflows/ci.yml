name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least privilege: the gate only reads the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save runner time.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check
      - run: pnpm test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # package main has //go:embed all:frontend/dist; provide a stub so the Go
      # tooling can compile it. The security scanners analyze Go source, not the
      # frontend bundle, so a placeholder is sufficient here.
      - name: Stub frontend/dist for //go:embed
        run: mkdir -p frontend/dist && touch frontend/dist/index.html
      - name: govulncheck (allowlist gate)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          bash scripts/govulncheck-gate.sh
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.27.1
          gosec -conf .gosec.json ./...

  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Linux WebKit deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      # Build the frontend bundle so package main's //go:embed all:frontend/dist
      # resolves for go vet / go test (wails build rebuilds it afterwards).
      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
      - run: go vet ./...
      - run: go test ./...
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1
      # ubuntu-24.04 ships webkit2gtk-4.1 (not 4.0, which Wails defaults to), so
      # the Linux build needs the webkit2_41 tag.
      - name: Wails build (Linux)
        if: runner.os == 'Linux'
        run: wails build -tags webkit2_41
      - name: Wails build
        if: runner.os != 'Linux'
        run: wails build
